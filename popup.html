<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5efff;
      color: #4a3e56;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      position: relative;
    }

    .container {
      position: relative;
      z-index: 2;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bg-animation {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .circle {
      position: absolute;
      background: linear-gradient(135deg, rgba(155, 102, 255, 0.25), rgba(115, 31, 255, 0.15));
      border-radius: 50%;
      top: -60px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(550px) rotate(360deg);
        opacity: 0;
      }
    }

    .circle:nth-child(1) { left: 10%; width: 40px; height: 40px; animation-duration: 8s; animation-delay: 0s; }
    .circle:nth-child(2) { left: 30%; width: 25px; height: 25px; animation-duration: 11s; animation-delay: 2s; }
    .circle:nth-child(3) { left: 55%; width: 50px; height: 50px; animation-duration: 9s; animation-delay: 4s; }
    .circle:nth-child(4) { left: 75%; width: 20px; height: 20px; animation-duration: 7s; animation-delay: 1s; }
    .circle:nth-child(5) { left: 85%; width: 35px; height: 35px; animation-duration: 13s; animation-delay: 5s; }

    h2 {
      margin: 0 0 2px 0;
      font-size: 22px;
      font-weight: 800;
      color: #731fff;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 8px rgba(115, 31, 255, 0.15);
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      color: #9b66ff;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: -4px;
    }

    input, textarea {
      box-sizing: border-box;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid #dacbf5;
      color: #2d1f3d;
      padding: 16px;
      border-radius: 14px;
      outline: none;
      font-size: 16px;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(155, 102, 255, 0.08);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, textarea:focus {
      border-color: #8033ff;
      box-shadow: 0 0 0 4px rgba(128, 51, 255, 0.15), 0 8px 20px rgba(128, 51, 255, 0.25);
    }

    input::placeholder {
      color: #bdaec7;
    }

    textarea {
      resize: none;
      height: 80px;
    }

    button {
      box-sizing: border-box;
      width: 100%;
      padding: 18px;
      background: #8033ff;
      color: #ffffff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(128, 51, 255, 0.35);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    button:hover {
      background: #9452ff;
      box-shadow: 0 8px 24px rgba(128, 51, 255, 0.5);
    }

    button:active {
      transform: scale(0.97);
    }

    button:not(#run) {
      background: #ff40aa;
      color: #ffffff;
      box-shadow: 0 6px 16px rgba(255, 64, 170, 0.35);
      margin-top: 2px;
    }

    button:not(#run):hover {
      background: #ff66be;
      box-shadow: 0 8px 24px rgba(255, 64, 170, 0.5);
    }

    .output {
      box-sizing: border-box;
      margin-top: 6px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 2px dashed #cfbdf2;
      padding: 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.6;
      color: #3b2d4a;
      min-height: 65px;
      white-space: normal;
      max-height: 250px;
      overflow-y: auto;
      box-shadow: 0 4px 12px rgba(155, 102, 255, 0.05);
    }

    br {
      display: none;
    }
  </style>
</head>

<body>
  <div class="bg-animation">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="container">
    <h2>Amethyst i-Ready Assistant</h2>

    <div class="label">API Key</div>
    <input type="password" id="apiKey" placeholder="Enter Gemini API key">

    <input type="hidden" id="prompt" value="Answer the question as basically as possible while still providing an explanation without using $\boxed or $\frac or anything like that involving math symbols other than X for multiplications, / for division, and + and -. show fractions using / (ex. 3/4 = three fourths). Try to provide an answer which is simple yet still explains the problem to a high degree.">

    <button id="run">GET ANSWER</button>
      
    <button id="diagnostic">ENABLE DIAGNOSTIC MODE</button>

    <div class="output" id="out">Ready.</div>
  </div>
  
  <script src="marked.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
